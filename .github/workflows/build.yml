name: build

on:
  push:
    branches: [ "master", "main", "development" ]
  pull_request:
    branches: [ "master", "main", "development" ]

jobs:
  backend_build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.24.x
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - run: go version

      - name: Run Build
        run: make build